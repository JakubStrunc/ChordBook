name: ChordBook CI

on:
  push: 
    branches:
      - main
    
  pull_request: 
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore ChordBook.sln

      - name: Build solution
        run: dotnet build ChordBook.sln --configuration Release --no-restore

      - name: Run tests
        run: dotnet test ChordBook.sln --configuration Release --no-build
