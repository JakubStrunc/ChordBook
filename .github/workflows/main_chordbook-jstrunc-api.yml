name: Deploy ChordBook API to Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  API_PROJECT: ChordBook.Api/ChordBook.Api.csproj
  SOLUTION: ChordBook.sln
  MIGRATIONS_PROJECT: ChordBook.Api/ChordBook.Api.csproj
  PUBLISH_DIR: ${{ github.workspace }}/publish
  MIGRATION_BUNDLE: ${{ github.workspace }}/efbundle

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore API
        run: dotnet restore "${{ env.API_PROJECT }}"

      - name: Build API
        run: |
          dotnet build "${{ env.API_PROJECT }}" \
            --configuration Release \
            --no-restore

      - name: Publish API
        run: |
          dotnet publish "${{ env.API_PROJECT }}" \
            --configuration Release \
            --no-build \
            --output "${{ env.PUBLISH_DIR }}"

      - name: Install EF Core tool
        run: dotnet tool install --global dotnet-ef

      - name: Create migration bundle
        env:
          ConnectionStrings__ChordBook: ${{ secrets.AZURE_SQL_CONNECTION_STRING }}
          Jwt__Key: "ChordBook-migration-key-that-is-at-least-32-characters"
          Jwt__Issuer: "ChordBook"
          Jwt__Audience: "ChordBookClient"
          Auth__Username: "migration"
          Auth__Password: "migration-password"
        run: |
          dotnet ef migrations bundle \
            --project "${{ env.MIGRATIONS_PROJECT }}" \
            --startup-project "${{ env.API_PROJECT }}" \
            --configuration Release \
            --self-contained \
            --target-runtime linux-x64 \
            --output "${{ env.MIGRATION_BUNDLE }}"

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: chordbook-deployment
          path: |
            ${{ env.PUBLISH_DIR }}
            ${{ env.MIGRATION_BUNDLE }}

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build

    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: "Y"
          MSSQL_SA_PASSWORD: "ChordBook_ci123!"
        ports:
          - 1433:1433

    env:
      ConnectionStrings__ChordBook: "Server=localhost,1433;Database=ChordBook;User Id=sa;Password=ChordBook_ci123!;TrustServerCertificate=True"
      Jwt__Key: "ChordBook-test-key-that-is-at-least-32-characters"
      Jwt__Issuer: "ChordBook"
      Jwt__Audience: "ChordBookClient"
      Auth__Username: "test"
      Auth__Password: "test-password"

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore solution
        run: dotnet restore "${{ env.SOLUTION }}"

      - name: Build solution
        run: |
          dotnet build "${{ env.SOLUTION }}" \
            --configuration Release \
            --no-restore

      - name: Run tests with code coverage
        run: |
          dotnet test "${{ env.SOLUTION }}" \
            --configuration Release \
            --no-build \
            --collect:"XPlat Code Coverage"

  migrate:
    name: Migrate database
    runs-on: ubuntu-latest
    needs: test

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download deployment artifact
        uses: actions/download-artifact@v4
        with:
          name: chordbook-deployment
          path: ./deployment

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_30BFA2D200334E22AC86FFF3FE3CE65E }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_336294E0B80E4564AF7B475A12BE7298 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_F53435046F544589A79DEB6EDB1DF3F4 }}

      - name: Get GitHub runner IP
        id: runner-ip
        run: |
          echo "ip=$(curl --silent https://api.ipify.org)" >> "$GITHUB_OUTPUT"

      - name: Allow GitHub runner through SQL firewall
        run: |
          az sql server firewall-rule create \
            --resource-group chordbook-rg \
            --server chordbook-jstrunc \
            --name "GitHubActions-${{ github.run_id }}" \
            --start-ip-address "${{ steps.runner-ip.outputs.ip }}" \
            --end-ip-address "${{ steps.runner-ip.outputs.ip }}"

      - name: Run database migrations
        env:
          ConnectionStrings__ChordBook: ${{ secrets.AZURE_SQL_CONNECTION_STRING }}
          Jwt__Key: "ChordBook-migration-key-that-is-at-least-32-characters"
          Jwt__Issuer: "ChordBook"
          Jwt__Audience: "ChordBookClient"
          Auth__Username: "migration"
          Auth__Password: "migration-password"
        run: |
          chmod +x ./deployment/efbundle
          ./deployment/efbundle \
            --connection "${{ secrets.AZURE_SQL_CONNECTION_STRING }}"

      - name: Remove GitHub runner from SQL firewall
        if: always()
        continue-on-error: true
        run: |
          az sql server firewall-rule delete \
            --resource-group chordbook-rg \
            --server chordbook-jstrunc \
            --name "GitHubActions-${{ github.run_id }}"

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: migrate

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download deployment artifact
        uses: actions/download-artifact@v4
        with:
          name: chordbook-deployment
          path: ./deployment

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_30BFA2D200334E22AC86FFF3FE3CE65E }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_336294E0B80E4564AF7B475A12BE7298 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_F53435046F544589A79DEB6EDB1DF3F4 }}

      - name: Deploy API to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: chordbook-jstrunc-api
          slot-name: Production
          package: ./deployment/publish